name: Debug Bayern Players

on:
  workflow_dispatch: # 手動実行専用

jobs:
  debug-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Debug Script
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }} 
        run: node debug_bayern.js
