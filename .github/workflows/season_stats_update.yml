name: Daily Season Stats Update

on:
  schedule:
    # 毎日 19:15 UTC (＝日本時間 04:15) に実行
    - cron: '15 19 * * *'
  workflow_dispatch: # 手動実行ボタンも用意

jobs:
  update-season-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch Season Stats
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: node fetch_season_stats.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/season/
          git commit -m "Update Daily Season Stats" || exit 0
          git pull --rebase origin main
          git push
