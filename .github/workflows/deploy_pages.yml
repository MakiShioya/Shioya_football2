name: Deploy to GitHub Pages

on:
  # mainブランチにプッシュ（ファイルの変更）があったら自動で実行
  push:
    branches: ["main"]
  # 手動実行ボタン
  workflow_dispatch:

# Pagesにデプロイするために必須の権限設定
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy index_web.html to index.html for Web SEO
        run: cp public/index_web.html public/index.html

      - name: Copy transfer_web.html to transfer.html for Web SEO # 👈 【追記】
        run: cp public/transfer_web.html public/transfer.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ★ ここが重要：public フォルダの中身だけを抽出して公開する
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
