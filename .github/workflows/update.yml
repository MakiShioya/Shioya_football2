name: Daily Football Data Fetch

on:
  schedule:
    # 毎日 日本時間 09:10 (UTC 00:10) に実行
    - cron: '07 0 * * *'
  workflow_dispatch: # 手動実行ボタンを表示

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # データをGitHubに書き込む権限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch API Data
        env:
          # 左側がプログラム内での名前、右側がGitHubに保存した名前です
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }} 
        run: node fetch_data.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/matches/
          
          # 変更がある場合のみ、最新状態を取り込んでからプッシュ
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-update matches data"
            git pull --rebase origin main
            git push
          )
