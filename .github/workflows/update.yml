name: Daily Football Data Fetch

on:
  # GitHubの気まぐれなタイマーを削除し、外部(Google)からの呼び出しに変更します
  repository_dispatch:
    types: [trigger-fetch-data]
  workflow_dispatch: # 手動実行ボタンは残す

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 【重要】これを絶対に消さないでください
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch API Data
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }} 
        run: node fetch_data.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/matches/
          
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-update matches data"
            git pull --rebase origin main
            git push
          )
