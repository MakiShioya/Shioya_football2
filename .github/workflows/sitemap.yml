name: Update Sitemap Lastmod

on:
  # ① 毎日 日本時間 09:15 に実行（データ更新の5分後に実行）
  schedule:
    - cron: '15 0 * * *'
  # ② 以下のHTMLファイルが変更されてプッシュされた時にも自動実行
  push:
    paths:
      - 'public/index.html'
      - 'public/performance.html'
      - 'public/dashboard.html'
      - 'public/best11.html'
      - 'public/transfer.html'
  # ③ 手動で実行できるボタンを表示
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHubに書き込む権限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update lastmod date in sitemap.xml
        run: |
          TODAY=$(date +'%Y-%m-%d')
          sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>$TODAY</lastmod>|g" public/sitemap.xml

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml
          
          # 変更がある場合のみ、最新状態を取り込んでからプッシュ
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto-update sitemap lastmod date"
            git pull --rebase origin main
            git push
          )
