<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>欧州日本人ダッシュボード - Shioya Football</title>
    
    <!-- ▼ Firebaseの読み込みを追加 ▼ -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4686002256203931" crossorigin="anonymous"></script>
    <link rel="preload" href="font/setofont.ttf" as="font" type="font/ttf" crossorigin>
    
    <!-- 共通設定 -->
    <link rel="stylesheet" href="common.css">

    <style>
        /* dashboard.html 固有のスタイル */
        .container { 
    padding: 15px; 
    max-width: 800px; 
    margin: 0 auto; 
    /* 下部メニューと重ならないよう、十分に余白を確保 */
    padding-bottom: 250px !important; 
}
        
        /* フィルターボタンエリア */
        .filter-area {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .filter-area::-webkit-scrollbar { display: none; }
        .filter-btn {
            background: #432517; color: #ECDBBF; border: 2px solid #8b4513;
            padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; white-space: nowrap;
        }
        .filter-btn.active { background: #d35400; color: white; border-color: #e67e22; }

        /* リーダーボード（トップ選手カード） */
        .leaders-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 25px;
        }
        .leader-card {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            border: 3px solid #8b4513; border-radius: 12px; padding: 12px; text-align: center; color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative;
        }
        .leader-title { font-size: 0.9rem; font-weight: bold; color: #8b4513; margin-bottom: 5px; }
        .leader-name { font-size: 1.2rem; font-weight: 900; }
        .leader-stat { font-size: 1.8rem; font-weight: 900; color: #c0392b; line-height: 1; margin: 5px 0; }
        .leader-sub { font-size: 0.75rem; color: #555; }
        .leader-icon { position: absolute; top: 5px; right: 5px; font-size: 1.2rem; opacity: 0.7; }

        /* 全選手スタッツテーブル */
        .stats-table-wrapper {
            background: #fff8dc; border: 3px solid #8b4513; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stats-table { width: 100%; border-collapse: collapse; color: #333; text-align: center; font-size: 0.9rem; }
        .stats-table th { background: #d35400; color: white; padding: 10px 5px; position: sticky; top: 0; cursor: pointer; font-size: 0.8rem; }
        .stats-table th:active { background: #e67e22; }
        .stats-table td { padding: 10px 5px; border-bottom: 1px solid #dcdde1; }
        .stats-table tr:last-child td { border-bottom: none; }
        .player-cell { text-align: left; font-weight: bold; padding-left: 10px !important; }
        .team-league { font-size: 0.7rem; color: #666; font-weight: normal; margin-top: 2px; }

        /* アクティブボタンの強調 */
        .btn-notes { border-color: white !important; }
    </style>
</head>
<body>

    <header class="top-bar">
        <button class="menu-icon-btn" onclick="openNavModal()">☰</button>
        <h1>欧州日本人 ダッシュボード</h1>
        <!-- ▼ アカウントアイコンを追加 ▼ -->
        <button id="accountIconBtn" class="account-icon-btn" onclick="showAuthModal()">👤</button>
    </header>

    <main class="container">
        <div class="filter-area" id="league-filters">
            <button class="filter-btn active" data-league="ALL">欧州全体</button>
            <button class="filter-btn" data-league="Premier League">プレミア</button>
            <button class="filter-btn" data-league="La Liga">ラ・リーガ</button>
            <button class="filter-btn" data-league="Bundesliga">ブンデス</button>
        </div>

        <div class="leaders-grid" id="leaders-container">
            <p style="text-align: center; grid-column: 1 / -1;">集計中...</p>
        </div>

        <h2 style="font-size: 1.1rem; border-bottom: 2px solid #ecdbbf; padding-bottom: 5px; margin-top: 30px;">全選手スタッツ一覧 (タップで並び替え)</h2>
        <div class="stats-table-wrapper">
            <table class="stats-table">
                <thead>
                    <tr>
                        <th class="player-cell" onclick="sortData('name')">選手名 ↕️</th>
                        <th onclick="sortData('goals')">得点 ↕️</th>
                        <th onclick="sortData('assists')">ｱｼｽﾄ ↕️</th>
                        <th onclick="sortData('rating')">評点 ↕️</th>
                        <th onclick="sortData('minutes')">出場(分) ↕️</th>
                    </tr>
                </thead>
                <tbody id="stats-tbody">
                    <tr><td colspan="5">データを読み込み中...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
    
    <!-- 不要な余白150pxと、旧広告バナー枠は削除しました -->

    <div class="bottom-menu">
        <button class="menu-btn btn-schedule" onclick="location.href='index.html'">予定を確認</button>
        <button class="menu-btn btn-results" onclick="location.href='performance.html'">昨日の日本人</button>
        <button class="menu-btn btn-calendar" onclick="location.href='best11.html'">今週の日本代表</button>
        <button class="menu-btn btn-transfer" onclick="location.href='transfer.html'">移籍</button>
        <button class="menu-btn btn-notes" onclick="location.href='dashboard.html'">シーズン</button>
    </div>

    <div id="navModal" class="modal-overlay" onclick="closeNavModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="closeNavModal()">×</button>
            <h2 style="color:#432517; font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px dashed #432517; padding-bottom:10px;">メニュー</h2>
            <a href="https://shioya-soft.com/" target="_blank" rel="noopener noreferrer" class="modal-link" style="background: #ff9800;">しおやソフト公式</a>
            <a href="https://shioya-soft.com/terms.html" target="_blank" rel="noopener noreferrer" class="modal-link">利用規約</a>
            <a href="https://shioya-soft.com/privacy.html" target="_blank" rel="noopener noreferrer" class="modal-link">プライバシーポリシー</a>
        </div>
    </div>

    <!-- ▼ アカウント関連モーダル ▼ -->
    <div id="authModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: #fff8dc; padding: 20px; border: 4px solid #8b4513; border-radius: 10px; text-align: center; width: 320px; max-height: 90vh; overflow-y: auto; box-sizing: border-box;">
          <h2 id="authTitle" style="margin-top: 0; color: #8b4513; font-size: 1.2rem;">アカウント</h2>
          
          <div id="pointsArea" style="display: none; background: #FFB347; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-shadow: 1px 1px 2px #432517;">
              所持ポイント: <span id="userGoldDisplay">0</span> G
          </div>

          <div id="authButtons" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
            <button id="btnEmailLogin" onclick="showEmailInputs()" style="background: #8b4513; color: #ECDBBF; width: 100%; height: 40px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">
              しおやアカウントでサインイン
            </button>
            <button id="btnAppleLogin" onclick="loginWithApple()" style="background: #000; color: #fff; width: 100%; height: 40px; border: none; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px;">
              <span style="font-size: 18px; margin-right: 8px;"></span> Appleでサインイン
            </button>
            <button id="btnGoogleLogin" onclick="loginWithGoogle()" style="background: #fff; color: #757575; width: 100%; height: 40px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px;">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" style="margin-right: 8px;"> Googleでサインイン
            </button>
          </div>
      
          <div id="emailInputArea" style="display: none; margin-top: 15px; border-top: 1px solid #ccc; padding-top: 15px;">
            <input type="email" id="authEmail" placeholder="メールアドレス" style="width: 100%; padding: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box;">
            <input type="password" id="authPass" placeholder="パスワード" style="width: 100%; padding: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box;">
            <div style="display: flex; justify-content: space-between; gap: 5px;">
              <button onclick="loginUser()" style="background: #007bff; color: #fff; flex: 1; height: 35px; border: none; border-radius: 5px; font-size: 14px;">ログイン</button>
              <button onclick="registerUser()" style="background: #28a745; color: #fff; flex: 1; height: 35px; border: none; border-radius: 5px; font-size: 14px;">新規登録</button>
            </div>
            <button onclick="hideEmailInputs()" style="margin-top: 10px; background: none; border: none; color: #8b4513; text-decoration: underline; font-size: 12px; cursor: pointer;">戻る</button>
          </div>
      
          <div id="loggedInStatusArea" style="display: none; margin: 15px 0 10px 0; font-size: 1rem; color: #333; font-weight: bold; background: rgba(255,255,255,0.6); padding: 10px; border-radius: 5px; text-align: center;">
            ✅ <span id="loginProviderText"></span> でログイン中
          </div>
      
          <div id="tosPrivacyText" style="margin-top: 15px; font-size: 0.75rem; color: #555; line-height: 1.4; text-align: left;">
           サインイン（または新規登録）をすることで、<br>
           <a href="https://shioya-soft.com/terms.html" target="_blank" style="color: #007bff;">利用規約</a> および <a href="https://shioya-soft.com/privacy.html" target="_blank" style="color: #007bff;">プライバシーポリシー</a><br>
           に同意したものとみなされます。
          </div>
      
          <div style="margin-top:15px; border-top:1px solid #ccc; padding-top:10px;">
             <button id="logoutBtnInModal" onclick="logoutUser()" style="display:none; background: #6c757d; border:none; border-radius:5px; color: #ECDBBF; width: 100%; height: 40px; font-size: 14px; cursor:pointer; margin-bottom: 10px;">ログアウト</button>
             <button id="deleteAccountBtnInModal" onclick="deleteUserAccount()" style="display:none; background: transparent; border: 1px solid #dc3545; border-radius:5px; color: #dc3545; width: 100%; height: 35px; font-size: 13px; font-weight:bold; margin-bottom: 10px; cursor:pointer;">退会（アカウントを削除する）</button>
             <button onclick="closeAuthModal()" style="margin-top: 10px; background: #ccc; border: none; color: black; width: 100%; height: 35px; font-size: 14px; border-radius: 5px; cursor:pointer;">閉じる</button>
          </div>
        </div>
    </div>

    <!-- ▼ 名前入力用モーダル（初回登録時） ▼ -->
    <div id="initialNameModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center;">
        <div style="background: #fff8dc; padding: 25px; border: 4px solid #8b4513; border-radius: 10px; text-align: center; width: 300px;">
          <h3 style="margin-top: 0; color: #8b4513;">登録ありがとうございます！</h3>
          <p style="font-size: 0.9rem; color: #333; line-height: 1.5; text-align: left;">
            まずはあなたのお名前を入力してください。<br>
            <span style="font-size: 0.8rem; color: #666;">（8文字以内）</span>
          </p>
          <input type="text" id="initialNameInput" maxlength="8" placeholder="なまえ" style="width: 100%; padding: 10px; font-size: 1.2rem; border: 2px solid #8b4513; border-radius: 5px; text-align: center; box-sizing: border-box; margin-bottom: 20px;">
          <button onclick="saveNewName()" style="background: #28a745; color: #ECDBBF; width: 100%; height: 45px; border: none; border-radius: 5px; font-size: 1.1rem; font-weight: bold; cursor: pointer;">決定</button>
        </div>
    </div>

    <script>
        function openNavModal() { document.getElementById('navModal').style.display = 'flex'; }
        function closeNavModal() { document.getElementById('navModal').style.display = 'none'; }
        
        function showEmailInputs() {
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('emailInputArea').style.display = 'block';
        }
        function hideEmailInputs() {
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('emailInputArea').style.display = 'none';
        }
    </script>

    <!-- ▼ 既存・認証・広告用スクリプト ▼ -->
    <script src="dashboard.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
