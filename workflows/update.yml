name: Daily Football Data Fetch

on:
  schedule:
    # 毎日 UTC 19:00（日本時間で朝04:00）に実行
    - cron: '0 19 * * *'
  workflow_dispatch: # 手動実行ボタンを表示

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # データをGitHubに書き込む権限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Node.js 20以上なら標準でfetchが使えるため、package.jsonが不要になります

      - name: Fetch API Data
        env:
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: node fetch_data.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update matches data" && git push)
